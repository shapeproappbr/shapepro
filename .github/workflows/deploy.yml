name: Deploy para shapepro.app.br

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy via rsync SSH
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 200.234.207.82 >> ~/.ssh/known_hosts

      - name: Enviar arquivos via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='.env' \
            --exclude='*.log' \
            --exclude='logs/' \
            --exclude='storage/' \
            --exclude='CHANGELOG_CLAUDE.md' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ root@200.234.207.82:/var/www/shapepro/
