name: Deploy para shapepro.app.br

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy via rsync SSH
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Carregar chave SSH no agente
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Adicionar servidor aos hosts conhecidos
        run: ssh-keyscan -H 200.234.207.82 >> ~/.ssh/known_hosts

      - name: Testar conexão SSH com o servidor
        run: ssh -o StrictHostKeyChecking=no root@200.234.207.82 "echo '[OK] SSH conectado como:' && whoami"

      - name: Enviar arquivos via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='.env' \
            --exclude='*.log' \
            --exclude='logs/' \
            --exclude='storage/' \
            --exclude='CHANGELOG_CLAUDE.md' \
            ./ root@200.234.207.82:/var/www/shapepro/
